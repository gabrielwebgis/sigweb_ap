<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>WebGIS PREFEITURAS MUNICIPAIS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 0.75rem 1.5rem;
      background: linear-gradient(to right, #0f172a, #1f2937);
      box-shadow: 0 1px 0 rgba(148, 163, 184, 0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      z-index: 1000;
    }

    header h1 {
      font-size: 1.125rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.875rem;
      color: #9ca3af;
    }

    .badge {
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.6);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    main {
      flex: 1;
      padding: 0.75rem 0.75rem 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .map-wrapper {
      flex: 1;
      border-radius: 0.9rem;
      overflow: hidden;
      background: radial-gradient(circle at top, #1f2937, #020617);
      box-shadow:
        0 18px 45px rgba(15, 23, 42, 0.8),
        0 0 0 1px rgba(148, 163, 184, 0.18);
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .leaflet-control-layers {
      border-radius: 0.75rem !important;
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.8) !important;
      box-shadow:
        0 14px 30px rgba(15, 23, 42, 0.7),
        0 0 0 1px rgba(148, 163, 184, 0.25);
    }

    .leaflet-control-layers-list {
      padding: 0.5rem 0.6rem !important;
      background: rgba(15, 23, 42, 0.96);
      color: #e5e7eb;
      font-size: 0.8rem;
    }

    .leaflet-control-layers-base label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.15rem 0.15rem;
      border-radius: 0.4rem;
      cursor: pointer;
    }

    .leaflet-control-layers-base label:hover {
      background: rgba(55, 65, 81, 0.7);
    }

    .leaflet-control-layers-overlays label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.15rem 0.15rem;
      border-radius: 0.4rem;
      cursor: pointer;
    }

    .leaflet-control-layers-separator {
      border-top: 1px solid rgba(75, 85, 99, 0.85);
      margin: 0.25rem 0;
    }

    .leaflet-control-zoom a {
      background: rgba(216, 72, 15, 0.96) !important;
      border-radius: 0.75rem !important;
      color: #e5e7eb !important;
      border: 1px solid rgba(148, 163, 184, 0.7) !important;
      box-shadow:
        0 10px 25px rgba(15, 23, 42, 0.9),
        0 0 0 1px rgba(148, 163, 184, 0.2) !important;
    }

    .leaflet-bar a:hover {
      background: rgba(28, 51, 128, 0.95) !important;
      color: #f9fafb !important;
    }

    .leaflet-container {
      background: #020617;
    }

    /* Popup com tabela de atributos */
    .popup-attr-table .leaflet-popup-content-wrapper {
      border-radius: 0.75rem;
      background: rgba(15, 23, 42, 0.98);
      border: 1px solid rgba(148, 163, 184, 0.5);
      box-shadow: 0 14px 35px rgba(15, 23, 42, 0.9);
    }

    .popup-attr-table .leaflet-popup-content {
      margin: 0.75rem 1rem;
      min-width: 180px;
    }

    .attr-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
      color: #e5e7eb;
    }

    .attr-table th,
    .attr-table td {
      padding: 0.35rem 0.6rem;
      text-align: left;
      border-bottom: 1px solid rgba(148, 163, 184, 0.35);
    }

    .attr-table th {
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .attr-table tbody tr:last-child td {
      border-bottom: none;
    }

    .attr-table tbody tr:hover td {
      background: rgba(55, 65, 81, 0.5);
    }

    /* Barra de pesquisa de inscrições no topo central do mapa */
    .lotes-search-bar {
      position: absolute;
      top: 0.7rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.6rem;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.7);
      box-shadow:
        0 12px 30px rgba(15, 23, 42, 0.9),
        0 0 0 1px rgba(148, 163, 184, 0.3);
      font-size: 0.8rem;
      color: #e5e7eb;
    }

    .lotes-search-bar input {
      border: none;
      outline: none;
      padding: 0.25rem 0.45rem;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      color: #e5e7eb;
      min-width: 200px;
      font-size: 0.8rem;
    }

    .lotes-search-bar input::placeholder {
      color: #9ca3af;
    }

    .lotes-search-bar button {
      border: none;
      border-radius: 999px;
      padding: 0.25rem 0.6rem;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      background: #22c55e;
      color: #022c22;
    }

    .lotes-search-bar button:hover {
      background: #16a34a;
      color: #ecfdf5;
    }

    footer {
      padding: 0.35rem 1.25rem 0.7rem;
      font-size: 0.75rem;
      color: #6b7280;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
    }

    footer a {
      color: #9ca3af;
      text-decoration: none;
    }

    footer a:hover {
      color: #e5e7eb;
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }

      .header-right {
        width: 100%;
        justify-content: space-between;
      }

    }
  </style>
</head>
<body>
  <header>
    <h1>WebGIS PREFEITURAS MUNICIPAIS</h1>
    <div class="header-right">
      <span class="badge">Leaflet</span>
      <span>Use o controle de camadas para alternar os basemaps.</span>
    </div>
  </header>

  <main>
    <div class="map-wrapper">
      <div id="map"></div>
      <div class="lotes-search-bar">
        <span>Inscrição Imobiliária:</span>
        <input
          type="text"
          id="lotesSearchInput"
          placeholder="Digite o valor da inscrição"
        />
        <button id="lotesSearchButton">Buscar</button>
      </div>
    </div>
  </main>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
    // Posição inicial ajustada para o município de Ubirajara (SP) e nível de zoom aproximado
    const initialCenter = [-22.527, -49.663]; // Coordenadas aproximadas de Ubirajara
    const initialZoom = 13;

    // Definição dos três mapas de fundo (basemaps)
    const osm = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 22,
      attribution:
        '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    });

    const opentopo = L.tileLayer(
      "https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png",
      {
        maxZoom: 17,
        attribution:
          'Map data: &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, ' +
          '<a href="https://viewfinderpanoramas.org">SRTM</a> | Map style: &copy; ' +
          '<a href="https://opentopomap.org">OpenTopoMap</a> (CC-BY-SA)',
      }
    );

    const esriWorldImagery = L.tileLayer(
      "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
      {
        maxZoom: 22,
        attribution:
          "Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, " +
          "Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community",
      }
    );

    // Inicializa o mapa com o basemap padrão (OSM)
    const map = L.map("map", {
      center: initialCenter,
      zoom: initialZoom,
      layers: [osm],
      zoomControl: true,
      attributionControl: false,
      maxZoom: 22,
    });

    // Grupo de mapas de fundo para o controle de camadas
    const baseMaps = {
      "OpenStreetMap": osm,
      "OpenTopoMap": opentopo,
      "Esri World Imagery": esriWorldImagery,
    };

    // Gera HTML da tabela de atributos.
    // options: { hiddenFields: string[], fieldAliases: Record<string, string> }
    function buildAttributesTable(properties, options = {}) {
      if (!properties || Object.keys(properties).length === 0) {
        return "<p><em>Sem atributos</em></p>";
      }
      const hidden = new Set(options.hiddenFields || []);
      const aliases = options.fieldAliases || {};
      let html =
        '<table class="attr-table"><thead><tr><th>Campo</th><th>Valor</th></tr></thead><tbody>';
      for (const [key, value] of Object.entries(properties)) {
        if (hidden.has(key)) continue;
        const label = Object.prototype.hasOwnProperty.call(aliases, key)
          ? aliases[key]
          : key;
        const displayValue =
          value === null || value === undefined ? "" : String(value);
        html += `<tr><td>${escapeHtml(label)}</td><td>${escapeHtml(
          displayValue
        )}</td></tr>`;
      }
      html += "</tbody></table>";
      return html;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    // Opções de tabela de atributos para a camada de lotes
    const LOTES_TABLE_OPTIONS = {
      hiddenFields: ["FID"],
      fieldAliases: {
        area_terre: "Área do terreno",
        incricao: "Inscrição Imobiliária",
      },
    };

    // Ao clicar na feição, abre popup com tabela de atributos completa (uso geral)
    const onEachFeatureWithTable = (feature, layer) => {
      layer.on("click", function () {
        const props = feature.properties || {};
        layer.bindPopup(buildAttributesTable(props), {
          maxWidth: 400,
          className: "popup-attr-table",
        }).openPopup();
      });
    };

    // Lotes: popup com FID oculto e apelidos configurados
    const onEachFeatureLotes = (feature, layer) => {
      layer.on("click", function () {
        const props = feature.properties || {};
        layer.bindPopup(buildAttributesTable(props, LOTES_TABLE_OPTIONS), {
          maxWidth: 400,
          className: "popup-attr-table",
        }).openPopup();
      });
    };

    // Camadas GeoJSON (vazias inicialmente) para os dados locais
    const edifLayer = L.geoJSON(null, {
      style: {
        color: "#f97316",
        weight: 1,
        fillColor: "#fdba74",
        fillOpacity: 0.4,
      },
      onEachFeature: onEachFeatureWithTable,
    });

    const lotesLayer = L.geoJSON(
      null,
      {
        style: {
          color: "#22c55e",
          weight: 1,
          fillColor: "#4ade80",
          fillOpacity: 0.35,
        },
        onEachFeature: onEachFeatureLotes,
      }
    );

    const quadrasLayer = L.geoJSON(null, {
      style: {
        color: "#3b82f6",
        weight: 2,
        fillOpacity: 0,
      },
      onEachFeature: onEachFeatureWithTable,
    });

    // Sobreposições (camadas vetoriais) controladas na lateral esquerda
    const overlays = {
      "Lotes (mdu_lotes_insc)": lotesLayer,
      "Edificações (mdu_edif)": edifLayer,
      "Quadras (mdu_quadras)": quadrasLayer,
    };

    // Controle de camadas na lateral esquerda
    L.control.layers(baseMaps, overlays, { position: "topleft" }).addTo(map);

    // Funções de busca por inscrição imobiliária (camada de lotes)
    function normalizeIncricao(value) {
      return String(value ?? "")
        .trim();
    }

    function zoomToLoteByIncricao(incricaoValue) {
      const target = normalizeIncricao(incricaoValue);
      if (!target) return false;

      const matches = [];
      lotesLayer.eachLayer((layer) => {
        const props = layer.feature && layer.feature.properties;
        if (!props || props.incricao === undefined || props.incricao === null) {
          return;
        }
        const current = normalizeIncricao(props.incricao);
        if (current === target) {
          matches.push(layer);
        }
      });

      if (!matches.length) {
        return false;
      }

      const group = L.featureGroup(matches);
      map.fitBounds(group.getBounds().pad(0.3));
      // abre popup do primeiro lote encontrado
      matches[0].fire("click");
      return true;
    }

    // Liga a barra de pesquisa do topo ao zoom nos lotes
    const lotesSearchInput = document.getElementById("lotesSearchInput");
    const lotesSearchButton = document.getElementById("lotesSearchButton");

    function runLotesSearch() {
      if (!lotesSearchInput) return;
      const ok = zoomToLoteByIncricao(lotesSearchInput.value);
      if (!ok) {
        lotesSearchInput.style.boxShadow =
          "0 0 0 1px rgba(248, 113, 113, 0.95)";
        setTimeout(() => {
          lotesSearchInput.style.boxShadow = "";
        }, 1200);
      }
    }

    if (lotesSearchButton) {
      lotesSearchButton.addEventListener("click", runLotesSearch);
    }

    if (lotesSearchInput) {
      lotesSearchInput.addEventListener("keydown", (ev) => {
        if (ev.key === "Enter") {
          runLotesSearch();
        }
      });
    }

    // Carregamento dos arquivos GeoJSON locais
    fetch("data/mdu_edif.geojson")
      .then((response) => response.json())
      .then((data) => {
        edifLayer.addData(data).addTo(map);
      })
      .catch((error) => {
        console.error("Erro ao carregar mdu_edif.geojson:", error);
      });

    fetch("data/mdu_lotes_insc.geojson")
      .then((response) => response.json())
      .then((data) => {
        lotesLayer.addData(data).addTo(map);
      })
      .catch((error) => {
        console.error("Erro ao carregar mdu_lotes_insc.geojson:", error);
      });

    fetch("data/mdu_quadras.geojson")
      .then((response) => response.json())
      .then((data) => {
        quadrasLayer.addData(data).addTo(map);
      })
      .catch((error) => {
        console.error("Erro ao carregar mdu_quadras.geojson:", error);
      });
  </script>
</body>
</html>
